<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0f0c29"/>
<title>לוח המטרות</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="root"><div class="shell" id="shell"></div></div>
<div id="bg-layer" style="position:fixed;inset:0;z-index:-1;background:linear-gradient(160deg,#0f0c29,#302b63,#24243e)"></div>

<input type="file" id="cameraInput" accept="image/*" capture="environment"/>
<input type="file" id="txtInput" accept=".txt"/>
<input type="file" id="fnpInput" accept=".txt,.fnp,.npa"/>
<input type="file" id="backupInput" accept=".json"/>

<script src="script.js"></script>
</body>
</html>
